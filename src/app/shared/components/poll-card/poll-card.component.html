<article
  class="poll-card"
  [class.poll-card--active]="isActive"
  [class.poll-card--past]="!isActive"
  [attr.role]="isActive ? 'button' : null"
  [attr.tabindex]="isActive ? 0 : null"
  [attr.aria-label]="isActive ? 'Open poll: ' + poll.title : poll.title"
  (click)="handleClick()"
  (keydown.enter)="handleClick()"
>
  <p class="poll-card__category" *ngIf="poll.category">{{ poll.category }}</p>

  <h3 class="poll-card__title">{{ poll.title }}</h3>
  <p class="poll-card__description" *ngIf="poll.description">{{ poll.description }}</p>

  <footer class="poll-card__footer">
    <span *ngIf="isActive && poll.deadline" class="poll-card__badge-wrap">
      <span class="poll-card__deadline-badge">{{ getEndsInText() }}</span>
    </span>
    <span *ngIf="!isActive" class="poll-card__closed-badge">Closed</span>
  </footer>
</article>
